<nav class="book-nav" style="display: flex; justify-content: space-between; align-items: center; margin-top: 2em; padding-top: 1em; border-top: 1px solid #e0e0e0; font-size: 0.9em;">
  {% if page.prev_chapter %}
    <a href="{{ page.prev_chapter.url }}" style="text-decoration: none;">
      &larr; {{ page.prev_chapter.title }}
    </a>
  {% else %}
    <span></span>
  {% endif %}

  {% unless page.book_role == "index" %}
    <a href="{{ site.baseurl }}/books/{{ page.book_slug }}/" style="text-decoration: none;">
      목차
    </a>
  {% else %}
    <span></span>
  {% endunless %}

  {% if page.next_chapter %}
    <a href="{{ page.next_chapter.url }}" style="text-decoration: none;">
      {{ page.next_chapter.title }} &rarr;
    </a>
  {% else %}
    <span></span>
  {% endif %}
</nav>
