---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %} data-lang="en">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.5.0/css/flag-icons.min.css">
    <style>
      .masthead__inner-wrap { display: flex; align-items: center; justify-content: space-between; }
      .masthead__menu { flex: 1; min-width: 0; }
      #lang-toggle { flex-shrink: 0; margin-left: 1em; }
      .lang-dropdown { position: relative; }
      .lang-dropdown__trigger { cursor: pointer; background: none; border: none; padding: 0.2em; line-height: 1; }
      .lang-dropdown__menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 0.4em; padding: 0.4em; background: var(--global-bg-color, #fff); border: 1px solid var(--global-text-color, #333); border-radius: 8px; z-index: 30; flex-direction: column; gap: 0.3em; }
      .lang-dropdown.open .lang-dropdown__menu { display: flex; }
      .lang-dropdown__menu button { cursor: pointer; opacity: 0.5; transition: opacity 0.2s; background: none; border: none; padding: 0.25em; line-height: 1; }
      .lang-dropdown__menu button.active { opacity: 1; }
      .lang-dropdown__menu button:hover { opacity: 1; }
      .lang-dropdown__menu .lang-coming-soon-wrap { display: flex; position: relative; cursor: pointer; }
      .lang-dropdown__menu button.lang-coming-soon { opacity: 0.2; pointer-events: none; background: none; border: none; padding: 0.25em; line-height: 1; }
      .coming-soon-tooltip { display: none; position: absolute; top: 50%; right: 100%; transform: translateY(-50%); margin-right: 0.4em; padding: 0.3em 0.6em; font-size: 0.7em; white-space: nowrap; background: #333; color: #fff; border-radius: 4px; z-index: 10; }
      .coming-soon-tooltip::before { content: ''; position: absolute; top: 50%; left: 100%; transform: translateY(-50%); border: 4px solid transparent; border-left-color: #333; }
      .lang-coming-soon-wrap:hover .coming-soon-tooltip { display: block; }
      .lang-dropdown .fi.fis { width: 1.4em; height: 1.4em; border-radius: 50%; background-size: cover; vertical-align: middle; }
      .lang-only-label { font-size: 0.75em; opacity: 0.6; margin-left: 0.4em; }
      .translation-banner { padding: 0.5em 1em; background: var(--global-code-bg-color, #f0f0f0); border-radius: 4px; margin-bottom: 1em; font-size: 0.9em; }
      [data-content-lang] { display: none; }
      html[data-lang="en"] [data-content-lang="en"] { display: block; }
      html[data-lang="ko"] [data-content-lang="ko"] { display: block; }
      html[data-lang="ja"] [data-content-lang="ja"] { display: block; }
    </style>
    <script>
      (function() {
        var lang = localStorage.getItem('site-lang');
        if (lang === 'ko' || lang === 'en' || lang === 'ja') {
          document.documentElement.setAttribute('data-lang', lang);
        }
      })();
    </script>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}
    <script src="{{ base_path }}/assets/js/language.js"></script>

  </body>
</html>
